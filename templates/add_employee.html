<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee - OnboardAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                        <polyline points="2 17 12 22 22 17"></polyline>
                        <polyline points="2 12 12 17 22 12"></polyline>
                    </svg>
                </div>
                <span class="brand-name">OnboardAI</span>
            </div>
            
            <nav class="nav-menu">
                <li class="nav-item">
                    <a href="{{ url_for('employee.employees') }}">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                        Employees
                    </a>
                </li>
                <li class="nav-item active">
                    <a href="{{ url_for('employee.add_employee') }}">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <line x1="19" y1="8" x2="19" y2="14"></line>
                            <line x1="16" y1="11" x2="22" y2="11"></line>
                        </svg>
                        Add Employee
                    </a>
                </li>
            </nav>
            
            <div class="sidebar-footer">
                <p>OnboardAI Agent v1.0.0</p>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Add New Employee</h1>
                    <p class="page-subtitle">Initiate the onboarding process by registering a new employee.</p>
                </div>
            </div>

            <!-- Add Employee Form Panel -->
            <div class="card-panel" style="max-width: 900px; margin: 0 auto;">
                {% if error %}
                <div class="alert-error">
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST">
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 1.5rem; padding-bottom: 0.75rem;">
                        <h2 style="font-size: 1.25rem; color: #fff; margin: 0;">Personal Details</h2>
                        <a href="{{ url_for('employee.employees') }}" style="font-size: 0.85rem; color: var(--primary); text-decoration: none;">Back to Manage Employee</a>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.25rem;">
                        <div class="form-group">
                            <label for="first_name">Employee First Name <span style="color: var(--primary);">*</span></label>
                            <input type="text" id="first_name" name="first_name" class="form-control" placeholder="Please Enter Employee First Name" required autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label for="middle_name">Employee Middle Name</label>
                            <input type="text" id="middle_name" name="middle_name" class="form-control" placeholder="Please Enter Employee Middle Name" autocomplete="off">
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.25rem;">
                        <div class="form-group">
                            <label for="last_name">Employee Last Name</label>
                            <input type="text" id="last_name" name="last_name" class="form-control" placeholder="Please Enter Employee Last Name" autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label for="gender">Gender</label>
                            <select id="gender" name="gender" class="form-control" style="background-color: var(--card-bg); color: #fff;">
                                <option value="" disabled selected>Please Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.25rem;">
                        <div class="form-group">
                            <label for="dob">Date of Birth</label>
                            <input type="date" id="dob" name="dob" class="form-control">
                        </div>
                        <div class="form-group">
                            <label for="mobile_number">Mobile Number</label>
                            <input type="text" id="mobile_number" name="mobile_number" class="form-control" placeholder="Please Enter Mobile Number" autocomplete="off">
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.25rem;">
                        <div class="form-group">
                            <label for="alternate_mobile">Alternate Mobile Number</label>
                            <input type="text" id="alternate_mobile" name="alternate_mobile" class="form-control" placeholder="Please Enter Alternate Mobile Number" autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label for="email">Email ID <span style="color: var(--primary);">*</span></label>
                            <input type="email" id="email" name="email" class="form-control" placeholder="Please Enter Email ID" required autocomplete="off">
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.25rem;">
                        <div class="form-group">
                            <label for="marital_status">Marital Status</label>
                            <select id="marital_status" name="marital_status" class="form-control" style="background-color: var(--card-bg); color: #fff;">
                                <option value="" disabled selected>Please Select Marital Status</option>
                                <option value="Single">Single</option>
                                <option value="Married">Married</option>
                                <option value="Divorced">Divorced</option>
                                <option value="Widow">Widow</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="blood_group">Blood Group</label>
                            <select id="blood_group" name="blood_group" class="form-control" style="background-color: var(--card-bg); color: #fff;">
                                <option value="" disabled selected>Please Select Blood Group</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                            </select>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem;">
                        <div class="form-group">
                            <label for="branch_depot">Employee Branch / Depot</label>
                            <input type="text" id="branch_depot" name="branch_depot" class="form-control" placeholder="Please Enter Employee Branch/Depot" autocomplete="off">
                        </div>
                    </div>

                    <div class="form-actions" style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1.5rem;">
                        <button type="submit" class="btn btn-primary">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                            Save & Initiate
                        </button>
                        <a href="{{ url_for('employee.employees') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
